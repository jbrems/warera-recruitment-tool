<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark slate background -->
  <rect width="64" height="64" fill="#1e293b" rx="8"/>
  
  <!-- Golden ascending bar chart -->
  <g fill="#facc15">
    <!-- Bar 1 -->
    <rect x="12" y="44" width="6" height="12" rx="1"/>
    
    <!-- Bar 2 -->
    <rect x="24" y="36" width="6" height="20" rx="1"/>
    
    <!-- Bar 3 -->
    <rect x="36" y="24" width="6" height="32" rx="1"/>
    
    <!-- Bar 4 -->
    <rect x="48" y="12" width="6" height="44" rx="1"/>
  </g>
  
  <!-- Connecting trend line -->
  <polyline
    points="15,44 27,36 39,24 51,12"
    fill="none"
    stroke="#facc15"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.7"
  />
</svg>
