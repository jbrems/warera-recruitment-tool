<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark slate background -->
  <rect width="64" height="64" fill="#1e293b" rx="8"/>
  
  <!-- Gold line (peaks later) -->
  <polyline
    points="8,48 16,40 24,32 32,28 40,18 48,32 56,26"
    fill="none"
    stroke="#facc15"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  
  <!-- Purple line (peaks early) -->
  <polyline
    points="8,46 16,24 24,36 32,42 40,48 48,46 56,50"
    fill="none"
    stroke="#a855f7"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  
  <!-- Gold dots -->
  <circle cx="8" cy="48" r="1.5" fill="#facc15"/>
  <circle cx="16" cy="40" r="1.5" fill="#facc15"/>
  <circle cx="24" cy="32" r="1.5" fill="#facc15"/>
  <circle cx="32" cy="28" r="1.5" fill="#facc15"/>
  <circle cx="40" cy="18" r="1.5" fill="#facc15"/>
  <circle cx="48" cy="32" r="1.5" fill="#facc15"/>
  <circle cx="56" cy="26" r="1.5" fill="#facc15"/>
  
  <!-- Purple dots -->
  <circle cx="8" cy="46" r="1.5" fill="#a855f7"/>
  <circle cx="16" cy="24" r="1.5" fill="#a855f7"/>
  <circle cx="24" cy="36" r="1.5" fill="#a855f7"/>
  <circle cx="32" cy="42" r="1.5" fill="#a855f7"/>
  <circle cx="40" cy="48" r="1.5" fill="#a855f7"/>
  <circle cx="48" cy="46" r="1.5" fill="#a855f7"/>
  <circle cx="56" cy="50" r="1.5" fill="#a855f7"/>
</svg>
